# 复现 2026-04-20 实验（ppo_seedNone_20260420_225352）的配置

scene:
  area_size: 1000.0
  num_locations: 200
  num_uavs: 80
  num_requests: 200
  num_time_slots: 4
  vnfs_per_request: 2

ppo:
  lr: 1e-4
  gamma: 0.99
  lambda: 0.95
  epsilon: 0.2
  value_loss_coef: 0.5
  entropy_coef: 0.02
  max_grad_norm: 0.5
  ppo_epochs: 4
  batch_size: 128
  num_episodes_per_update: 10

network:
  hidden_dim: 256
  num_heads: 4
  num_encoder_layers: 2
  dropout: 0.1
  use_cross_attn: true

training:
  total_episodes: 3000
  max_steps_per_episode: 800
  eval_interval: 100
  save_interval: 500
  use_reward_norm: true
  reward_scale: 1.0

env:
  max_pending: 200
  max_steps_per_slot: 200
  invalid_action_penalty: 1.0

dataset:
  base_seed: 42
  num_episodes: 100
  data_dir: "./data"

logging:
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"
  use_tensorboard: true
  verbose: true
